version: "3.9"

# ── Medical Graph RAG — Docker Compose ────────────────────────────────────────
# Starts: Neo4j graph database + FastAPI backend
# The React frontend runs separately via `npm run dev` (Vite dev server)
#
# Usage:
#   docker compose up --build          # first run (builds backend image)
#   docker compose up                  # subsequent runs
#   docker compose down -v             # stop and remove volumes

services:

  # ── Neo4j Graph Database ────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.19.0
    container_name: medical_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Neo4j Browser UI  → http://localhost:7474
      - "7687:7687"   # Bolt protocol     ← Python driver connects here
    environment:
      NEO4J_AUTH: neo4j/medgraph_password
      # Memory settings (adjust based on your machine)
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache__size: 512m
      # Allow vector index procedures
      NEO4J_dbms_security_procedures_unrestricted: "db.index.vector.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/import
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medical_backend
    restart: unless-stopped
    ports:
      - "8000:8000"   # API → http://localhost:8000
                      # Swagger UI → http://localhost:8000/docs
    environment:
      # Neo4j — use Docker service name, not localhost
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: medgraph_password
      # OpenAI — loaded from your .env file at project root
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENVIRONMENT: production
    env_file:
      - ./backend/.env     # Falls back to .env if present
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./backend/data:/app/data   # Persist uploaded/sample files

# ── Named Volumes ───────────────────────────────────────────────────────────────
volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_import:
    driver: local
