services:

  # ── Neo4j Graph Database ────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.19.0
    container_name: medical_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Neo4j Browser UI  → http://localhost:7474
      - "7687:7687"   # Bolt protocol     ← Python driver connects here
    environment:
      NEO4J_AUTH: neo4j/medgraph_password
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medical_backend
    restart: unless-stopped
    ports:
      - "8000:8000"   # API → http://localhost:8000
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: medgraph_password
      ENVIRONMENT: production
    env_file:
      - ./backend/.env      # Loads GEMINI_API_KEY from backend/.env
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./backend/data:/app/data

# ── Named Volumes ───────────────────────────────────────────────────────────────
volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
